<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Coin Mini App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-container">
        <h1 id="title">Tap & Earn</h1>
        
        <div class="balance-container">
            <span id="coin-icon">💰</span>
            <span id="balance">0</span>
        </div>

        <div class="coin-btn" id="tap-coin">
            🪙
        </div>

        <div class="action-buttons">
          <button class="btn invite-btn" id="invite-btn">👥 Invite Friends & Earn</button>
            <button class="btn ad-btn" id="watch-ad-btn">📺 Watch Ad & Earn (+50)</button>
            <button class="btn withdraw-btn" id="withdraw-btn">🏦 Withdraw</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
