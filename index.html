<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Control Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: white; padding: 20px; }
        h1 { color: #00b09b; text-align: center; margin-bottom: 30px; }
        h2 { color: #ffd700; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #161b22; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #2d333b; padding: 12px; text-align: left; }
        th { background: #21262d; color: #58a6ff; }
        input { padding: 6px; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 4px; width: 100px; }
        button { padding: 6px 12px; background: #238636; color: white; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .pending { background: #d29922; color: black; }
        .paid { background: #238636; color: white; }
    </style>
</head>
<body>

    <h1>👨‍⚖️ Live Game Admin Panel</h1>
    
    <h2>📊 Registered Users List</h2>
    <table>
        <thead>
            <tr>
                <th>User ID</th>
                <th>Name</th>
                <th>Score (Coins)</th>
                <th>Level</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="users-list"><tr><td colspan="5">Loading users...</td></tr></tbody>
    </table>

    <h2>💸 Withdraw Requests</h2>
    <table>
        <thead>
            <tr>
                <th>User Name</th>
                <th>Method</th>
                <th>Number</th>
                <th>Amount (৳)</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="withdraw-list"><tr><td colspan="6">Loading withdraw requests...</td></tr></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRIPJl700j0-v0FJPjQeIapnVQxHjd_oY",
            authDomain: "tg-game-d7a56.firebaseapp.com",
            projectId: "tg-game-d7a56",
            storageBucket: "tg-game-d7a56.firebasestorage.app",
            messagingSenderId: "1042867845549",
            appId: "1:1042867845549:web:39bfbb2b32ad8951680924",
            measurementId: "G-25DN521WZW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load All Users
        async function loadUsers() {
            const querySnapshot = await getDocs(collection(db, "users"));
            const list = document.getElementById('users-list');
            list.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const u = docSnap.data();
                list.innerHTML += `
                    <tr>
                        <td>${docSnap.id}</td>
                        <td>${u.name || 'User'}</td>
                        <td><input type="number" id="score-${docSnap.id}" value="${parseFloat(u.score || 0).toFixed(1)}"></td>
                        <td>${u.level || 1}</td>
                        <td><button onclick="updateUserScore('${docSnap.id}')">💾 Save Score</button></td>
                    </tr>
                `;
            });
        }

        // Save User Score
        window.updateUserScore = async (id) => {
            let newScore = parseFloat(document.getElementById(`score-${id}`).value);
            await updateDoc(doc(db, "users", id), { score: newScore });
            alert("✅ ইউজারের ব্যালেন্স সফলভাবে আপডেট করা হয়েছে!");
        };

        // Load Withdrawals
        async function loadWithdrawals() {
            const querySnapshot = await getDocs(collection(db, "withdrawals"));
            const list = document.getElementById('withdraw-list');
            list.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const w = docSnap.data();
                const statusClass = w.status === 'Paid ✅' ? 'paid' : 'pending';
                list.innerHTML += `
                    <tr>
                        <td>${w.userName || 'User'}</td>
                        <td><b>${w.method}</b></td>
                        <td>${w.accountNo}</td>
                        <td>৳${w.amountTk}</td>
                        <td><span class="badge ${statusClass}">${w.status}</span></td>
                        <td>
                            ${w.status !== 'Paid ✅' ? `<button onclick="approveWithdraw('${docSnap.id}')">✅ Approve Payment</button>` : 'Completed'}
                        </td>
                    </tr>
                `;
            });
        }

        window.approveWithdraw = async (id) => {
            await updateDoc(doc(db, "withdrawals", id), { status: "Paid ✅" });
            alert("✅ উইথড্র Approved দেওয়া হয়েছে!");
            loadWithdrawals();
        };

        loadUsers();
        loadWithdrawals();
    </script>
</body>
</html>
