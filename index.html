<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Tap Earn Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; height: 100vh; background: #1e293b; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .header { padding: 15px; text-align: center; background: #0f172a; border-bottom: 2px solid #334155; }
        .score-box { font-size: 28px; font-weight: bold; color: #f59e0b; }
        .level-badge { font-size: 14px; color: #38bdf8; margin-top: 4px; }
        .tab-content { display: none; padding: 20px; height: calc(100vh - 140px); overflow-y: auto; text-align: center; }
        .tab-content.active { display: block; }
        .tap-area { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .coin-btn { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #fbbf24, #d97706); border: 8px solid #fef08a; box-shadow: 0 0 25px rgba(251, 191, 36, 0.6); display: flex; justify-content: center; align-items: center; font-size: 70px; cursor: pointer; transition: transform 0.05s ease; margin-bottom: 20px; position: relative; }
        .coin-btn:active { transform: scale(0.92); }
        .energy-bar-container { width: 80%; background: #334155; border-radius: 10px; height: 16px; overflow: hidden; margin: 10px 0; }
        .energy-bar { height: 100%; background: #38bdf8; width: 100%; transition: width 0.2s; }
        .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; background: #2563eb; color: white; }
        .btn:disabled { opacity: 0.5; }
        .bottom-nav { height: 60px; background: #0f172a; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #334155; }
        .nav-item { color: #94a3b8; font-size: 12px; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #38bdf8; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; width: 85%; }
        .wheel { width: 200px; height: 200px; border-radius: 50%; border: 5px solid #fbbf24; margin: 10px auto; transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); background: conic-gradient(#f59e0b 0 45deg, #38bdf8 45deg 90deg, #10b981 90deg 135deg, #ec4899 135deg 180deg, #8b5cf6 180deg 225deg, #ef4444 225deg 270deg, #eab308 270deg 315deg, #6366f1 315deg 360deg); }
        .float-text { position: absolute; font-size: 24px; font-weight: bold; color: #fbbf24; animation: floatUp 0.6s ease-out forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
    </style>
</head>
<body>

    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="bg-music" src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3" loop preload="auto"></audio>

    <div class="app-container">
        <div class="header">
            <div class="score-box">💰 <span id="score">0.0</span></div>
            <div class="level-badge" id="level-text">🏆 Level: 1</div>
        </div>

        <!-- TAB 1: TAP GAME -->
        <div id="tab-game" class="tab-content active">
            <div class="tap-area">
                <div class="coin-btn" id="click-btn">🪙</div>
                <div class="energy-bar-container">
                    <div class="energy-bar" id="energy-bar"></div>
                </div>
                <div style="font-size: 14px; color: #94a3b8;" id="energy-text">200 / 200</div>
            </div>
        </div>

        <!-- TAB 2: TASKS & BOOSTS -->
        <div id="tab-tasks" class="tab-content">
            <h3>🚀 Boost & Tasks</h3>
            <button class="btn" id="gift-btn">🎁 Claim Hourly Gift (+10 ⚡)</button>
            <button class="btn" id="ad-btn" style="background: #eab308; color: black;">📺 Watch Ad (+50 ⚡)</button>
            <button class="btn" id="spin-open-btn" style="background: #8b5cf6;">🎡 Lucky Spin Wheel</button>
            <button class="btn" id="boost-btn" style="background: #10b981;">⚡ Upgrade Level</button>
        </div>

        <!-- TAB 3: WITHDRAW -->
        <div id="tab-wallet" class="tab-content">
            <h3>💸 Balance: <span id="wallet-balance-num">0.00</span> ৳</h3>
            <p style="font-size: 12px; color: #94a3b8; margin-bottom: 15px;">১০০০ পয়েন্ট = ১.০০ টাকা (সর্বনিম্ন ৫০ টাকা)</p>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="btn active" id="method-nagad" onclick="selectMethod('Nagad')" style="background: #d97706;">নগদ <span id="nagad-check">✅</span></button>
                <button class="btn" id="method-bkash" onclick="selectMethod('bKash')" style="background: #ec4899;">বিকাশ <span id="bkash-check" style="display:none;">✅</span></button>
            </div>
            
            <input type="number" id="withdraw-amount" placeholder="পরিমাণ (টাকা e.g. 50)">
            <input type="text" id="account-number" placeholder="মোবাইল নম্বর (11 digit)">
            <p id="selected-method-label" style="display:none;">Nagad</p>
            <button class="btn" id="confirm-withdraw-btn" style="background: #10b981;">উইথড্র করুন</button>
        </div>

        <!-- TAB 4: REFERRAL -->
        <div id="tab-invite" class="tab-content">
            <h3>👥 Invite Friends</h3>
            <p style="margin: 15px 0; color: #94a3b8; font-size: 14px;">বন্ধুদের ইনভাইট করুন এবং প্রতিটি রেফারেলের জন্য বোনাস পান!</p>
            <button class="btn" id="invite-btn" style="background: #0284c7;">🔗 Share Referral Link</button>
        </div>

        <!-- SPIN MODAL -->
        <div class="modal" id="spin-modal">
            <div class="modal-content">
                <h3>🎡 Lucky Spin</h3>
                <div class="wheel" id="wheel"></div>
                <button class="btn" id="spin-btn">Spin (Cost: 99 Coins)</button>
                <button class="btn" id="close-modal" style="background: #64748b; margin-top: 5px;">Close</button>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('tab-game')">🎮 Game</button>
            <button class="nav-item" onclick="switchTab('tab-tasks')">⚡ Boost</button>
            <button class="nav-item" onclick="switchTab('tab-wallet')">👛 Wallet</button>
            <button class="nav-item" onclick="switchTab('tab-invite')">👥 Ref</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
